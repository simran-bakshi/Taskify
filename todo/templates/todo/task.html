{% extends 'base.html' %}
{% load static %}
{% block title %}Add Task — Taskify{% endblock %}

{% block body %}
<div class="action-page">

  <!-- ── TOP NAV ── -->
  <nav class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">T</div>
      <span class="topbar-logo-name">Taskify</span>
    </div>

    <div class="topbar-nav">
      <a href="/">Dashboard</a>
      <a href="/task" class="active">Add Task</a>
    </div>

    <div class="topbar-hamburger" onclick="toggleNav()" id="hamburger">
      <span></span><span></span><span></span>
    </div>

    <div class="topbar-avatar">U</div>
  </nav>

  <!-- Mobile nav -->
  <div class="mobile-nav" id="mobileNav">
    <a href="/">Dashboard</a>
    <a href="/task">Add Task</a>
  </div>

  <!-- ── CENTERED BODY ── -->
  <div style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      padding: 32px 16px;
  ">

    <!-- Tagline above the box (replaces the left panel) -->
    <div style="text-align: center; margin-bottom: 24px;">
      <h2 style="margin: 0 0 8px; font-size: 1.6rem; font-weight: 700; color: #111;">
        Add a new task.
      </h2>
      <p style="margin: 0; color: #6b7280; font-size: 0.95rem;">
        Break your work into focused tasks.
      </p>
    </div>

    <!-- Form box -->
    <div class="action-form-box" style="width: 100%; max-width: 460px;">
      <h2 class="auth-form-title">New Task</h2>
      <p class="auth-form-sub">Fill in details</p>

      <form onsubmit="createTask(event)">

        <div class="form-group">
          <label class="form-label">Task title</label>
          <div class="form-field">
            <input type="text" name="title" placeholder="Task title" required>
          </div>
        </div>

        <!-- Inline error message -->
        <p id="taskError" style="color:red;font-size:0.875rem;margin-bottom:12px;display:none;"></p>

        <button type="submit" class="btn btn-primary">
          Add Task
        </button>
      </form>

      <div class="link-row">
        <a href="/">← Back to Dashboard</a>
      </div>
    </div>

  </div>
</div>

<script>
function toggleNav() {
  document.getElementById('mobileNav').classList.toggle('open');
}

async function createTask(e) {
  e.preventDefault();

  const title   = document.querySelector('input[name="title"]').value.trim();
  const token   = localStorage.getItem('access');
  const errorEl = document.getElementById('taskError');

  errorEl.style.display = 'none';
  errorEl.textContent   = '';

  if (!token) {
    window.location.href = '/login';
    return;
  }

  const res = await fetch('/api/tasks/', {
    method:  'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + token
    },
    body: JSON.stringify({ title: title, completed: false })
  });

  if (res.status === 401) {
    window.location.href = '/login';
    return;
  }

  if (res.status === 201) {
    window.location.href = '/';
    return;
  }

  const data = await res.json().catch(() => ({}));
  errorEl.textContent   = data.title?.[0] || data.detail || 'Could not create task. Please try again.';
  errorEl.style.display = 'block';
}
</script>

{% endblock %}
